<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Todo App</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="activity1.css">
</head>
<body>
    <div class="todo-container">
        <header>
            <h1>Todo App</h1>
        </header>
        
        <div class="input-section">
            <input type="text" id="task-input" placeholder="Enter your task..." autocomplete="off">
            <button id="add-btn"><i class="fas fa-plus"></i></button>
        </div>

        <div class="stats-section">
            <span id="task-count">0 tasks left</span>
            <button id="clear-all-btn" style="display: none;">Clear All</button>
        </div>

        <ul id="task-list">
            <!-- Tasks will be injected here via JS -->
            <li class="empty-state">No tasks yet. Add one above!</li>
        </ul>
    </div>

    <script src="activity1.js"></script>
</body>
</html>
